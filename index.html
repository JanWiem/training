<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="theme-color" content="#FFFFFF" />
<title>Satz – Calisthenics Log</title>
<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="./icons/icon-192.png" />
<link rel="icon" href="./icons/icon-64.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#FFFFFF; --bg2:#FBFBFA; --card:#FFFFFF;
    --ink:#37352F; --ink-soft:#5C5A54; --muted:#9B9A97; --faint:#C9C8C4;
    --line:#EAE9E5; --line-strong:#E0DFDB;
    --accent:#2383E2; --accent-d:#1B6CC0; --accent-soft:#E9F2FB;
    --tag-blue-bg:#E7F3F8; --tag-blue-tx:#2E6488;
    --tag-green-bg:#EDF3EC; --tag-green-tx:#4D7A5C;
    --tag-gray-bg:#F1F1EF; --tag-gray-tx:#6B6A66;
    --hover:#F7F6F3;
    --r:12px; --r-sm:9px;
    --safe-b:env(safe-area-inset-bottom,0px);
    --nav-h:62px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    background:var(--bg2); color:var(--ink);
    font-family:"Schibsted Grotesk",system-ui,sans-serif;
    font-size:16px; line-height:1.45; letter-spacing:-.006em;
    -webkit-font-smoothing:antialiased; overscroll-behavior-y:none;
  }
  #app{max-width:560px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;}
  .scroll{flex:1;padding:0 16px calc(var(--nav-h) + var(--safe-b) + 24px);}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input{font-family:inherit;}
  .num{font-family:"JetBrains Mono",monospace;font-variant-numeric:tabular-nums;}

  /* labels / headers */
  .eyebrow{font-size:11.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);}
  header.page{padding:max(22px,calc(env(safe-area-inset-top,0px) + 8px)) 16px 4px;}
  header.page .h{font-size:27px;font-weight:700;letter-spacing:-.025em;margin:2px 0 0;}
  header.page .sub{color:var(--muted);font-size:14px;margin-top:1px;}

  /* tags */
  .tag{font-size:11.5px;font-weight:600;padding:2.5px 8px;border-radius:6px;letter-spacing:.01em;white-space:nowrap;}
  .tag.reps{background:var(--tag-blue-bg);color:var(--tag-blue-tx);}
  .tag.hold{background:var(--tag-green-bg);color:var(--tag-green-tx);}
  .tag.gray{background:var(--tag-gray-bg);color:var(--tag-gray-tx);}

  /* buttons */
  .btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;
       font-weight:600;font-size:16px;padding:15px;border-radius:11px;transition:transform .1s,background .15s,border-color .15s;}
  .btn:active{transform:scale(.99);}
  .btn.primary{background:var(--accent);color:#fff;}
  .btn.primary:active{background:var(--accent-d);}
  .btn.dark{background:var(--ink);color:#fff;}
  .btn.hold{background:#4D7A5C;color:#fff;}
  .btn.ghost{background:var(--card);color:var(--ink);border:1px solid var(--line-strong);}
  .btn.ghost:active{background:var(--hover);}
  .btn.sm{padding:12px;font-size:15px;}

  /* generic card */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);}
  .seclabel{margin:26px 4px 10px;display:flex;align-items:baseline;justify-content:space-between;}
  .seclabel .eyebrow{font-size:12px;}
  .seclabel .cnt{font-size:12px;color:var(--muted);}

  /* ---------- TRAIN TAB ---------- */
  .hero{margin-top:14px;}
  .quickplans{display:flex;flex-direction:column;gap:8px;margin-top:10px;}
  .qp{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:13px 15px;border-radius:var(--r);
      background:var(--card);border:1px solid var(--line);transition:background .12s;}
  .qp:active{background:var(--hover);}
  .qp .ic{width:30px;height:30px;border-radius:8px;background:var(--accent-soft);display:grid;place-items:center;flex:none;}
  .qp .nm{flex:1;font-weight:600;font-size:15px;}
  .qp .me{font-size:12.5px;color:var(--muted);}
  .qp .go{color:var(--accent);font-weight:600;font-size:13.5px;}

  .sess{display:flex;align-items:center;gap:13px;width:100%;text-align:left;padding:13px 14px;border-radius:var(--r);
        background:var(--card);border:1px solid var(--line);margin-bottom:8px;transition:background .12s;}
  .sess:active{background:var(--hover);}
  .sess .day{flex:none;width:42px;text-align:center;}
  .sess .day .d{font-size:19px;font-weight:700;line-height:1;}
  .sess .day .m{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:2px;}
  .sess .div{width:1px;align-self:stretch;background:var(--line);}
  .sess .mid{flex:1;min-width:0;}
  .sess .mid .ex{font-weight:600;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sess .mid .meta{color:var(--muted);font-size:12.5px;margin-top:1px;}
  .sess .dur{flex:none;font-weight:700;font-size:14px;color:var(--ink-soft);}
  .empty{color:var(--muted);text-align:center;padding:40px 16px;font-size:14px;border:1px dashed var(--line-strong);border-radius:var(--r);}
  .empty .em{font-weight:700;font-size:16px;color:var(--ink);display:block;margin-bottom:5px;}

  /* ---------- ACTIVE (focus mode) ---------- */
  .focus{padding:0 16px calc(var(--safe-b) + 130px);}
  .dotpulse{width:7px;height:7px;border-radius:50%;background:#5BB98C;animation:pulse 2s ease-in-out infinite;display:inline-block;margin-right:6px;vertical-align:1px;}
  .endbtn2{flex:none;background:var(--ink);color:#fff;font-weight:600;font-size:13.5px;padding:9px 15px;border-radius:10px;margin-top:6px;}
  .endbtn2:active{opacity:.85;}
  .libadd{display:flex;gap:8px;margin:12px 0 14px;}
  .libadd input{flex:1;min-width:0;font-size:15px;font-weight:500;color:var(--ink);background:var(--card);border:1px solid var(--line-strong);border-radius:11px;padding:12px 13px;}
  .libadd input:focus{outline:none;border-color:var(--accent);}
  .libadd .btn{width:auto;padding:12px 16px;}
  .liblist{display:flex;flex-direction:column;gap:7px;}
  .librow{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:13px 14px;}
  .librow:active{background:var(--hover);}
  .librow .lmain{flex:1;min-width:0;}
  .librow .lname{font-weight:600;font-size:15.5px;color:var(--ink);}
  .librow .lcue{font-size:12.5px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .librow .lcue.faint{color:var(--faint);}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}

  /* guide card */
  .guide{background:var(--card);border:1px solid var(--accent);border-radius:var(--r);padding:16px;margin:6px 0 14px;box-shadow:0 1px 0 var(--accent-soft);}
  .guide.done{border-color:var(--line);text-align:center;padding:26px 18px;}
  .ghead{display:flex;align-items:center;justify-content:space-between;}
  .glabel{font-size:11.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--accent-d);}
  .gprog{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;}
  .gtitle{font-size:20px;font-weight:700;letter-spacing:-.02em;margin:7px 0 14px;display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
  .settag{font-size:11.5px;font-weight:600;color:var(--muted);background:var(--bg2);border:1px solid var(--line);padding:2px 8px;border-radius:6px;}
  .grow{display:flex;align-items:center;justify-content:space-between;margin-top:12px;}
  .glink{color:var(--muted);font-weight:600;font-size:13.5px;padding:4px 0;}
  .gnext{font-size:12.5px;color:var(--muted);text-align:right;}
  .gsub{color:var(--muted);font-size:14px;margin:4px 0 18px;}

  /* exercise card */
  .excard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);margin-bottom:10px;overflow:hidden;}
  .ex-head{display:flex;align-items:center;gap:9px;padding:13px 14px 11px;}
  .ex-head .name{font-weight:700;font-size:16px;flex:1;letter-spacing:-.01em;}
  .x{flex:none;width:28px;height:28px;border-radius:7px;color:var(--faint);font-size:15px;display:grid;place-items:center;}
  .x:active{background:var(--hover);color:var(--muted);}
  .sets{padding:0 14px;display:flex;flex-wrap:wrap;gap:6px;}
  .sets:last-child{padding-bottom:13px;}
  .setchip{font-weight:600;font-size:13.5px;background:var(--bg2);border:1px solid var(--line);padding:6px 10px;border-radius:8px;display:inline-flex;align-items:center;gap:6px;color:var(--ink-soft);}
  .setchip .i{font-size:10.5px;color:var(--faint);font-weight:700;}
  .setchip .rm{color:var(--faint);font-size:12px;}
  .setchip.pr{border-color:#E3C98A;background:#FBF6E9;color:#8A6D2B;}
  .setchip:active{background:var(--hover);}
  .addset{padding:12px 14px 15px;margin-top:10px;border-top:1px solid var(--line);}

  .stepper{display:flex;align-items:center;gap:10px;}
  .step{width:48px;height:48px;border-radius:12px;background:var(--bg2);border:1px solid var(--line-strong);font-size:23px;font-weight:600;display:grid;place-items:center;line-height:1;color:var(--ink);}
  .step:active{background:var(--hover);}
  .stepval{flex:1;text-align:center;}
  .stepval .v{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:28px;line-height:1;}
  .stepval .u{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.09em;margin-top:3px;}
  .lasthint{font-size:12.5px;color:var(--muted);margin-top:9px;text-align:center;}
  .logbtn{margin-top:12px;}

  /* composer */
  .composer{background:var(--card);border:1px dashed var(--line-strong);border-radius:var(--r);padding:13px;}
  .composer input{width:100%;font-size:16px;font-weight:600;color:var(--ink);background:var(--bg2);border:1px solid var(--line-strong);border-radius:10px;padding:13px 13px;}
  .composer input:focus{outline:none;border-color:var(--accent);background:#fff;}
  .modes{display:flex;gap:8px;margin-top:9px;}
  .modes button{flex:1;padding:11px;border-radius:9px;border:1px solid var(--line-strong);background:var(--bg2);font-weight:600;font-size:13.5px;color:var(--muted);transition:.12s;}
  .modes button.sel{background:var(--ink);color:#fff;border-color:var(--ink);}
  .addtoggle{width:100%;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:15px;font-weight:600;font-size:15px;color:var(--accent-d);display:flex;align-items:center;justify-content:center;gap:8px;}
  .addtoggle:active{background:var(--hover);}

  /* rest bar */

  /* ---------- PROGRESS TAB ---------- */
  .weekcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 15px;margin-bottom:14px;display:flex;gap:24px;}
  .weekcard .wstat{display:flex;flex-direction:column;}
  .weekcard .wval{font-weight:700;font-size:22px;letter-spacing:-.01em;}
  .weekcard .wlbl{font-size:11.5px;color:var(--muted);margin-top:2px;}
  .pcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 15px;margin-bottom:9px;}
  .pcard .top{display:flex;align-items:center;gap:9px;}
  .pcard .nm{font-weight:700;font-size:15.5px;flex:1;letter-spacing:-.01em;}
  .pcard .best{font-weight:700;font-size:15px;color:var(--ink);}
  .pcard .best .bl{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-left:6px;}
  .bars{display:flex;align-items:flex-end;gap:5px;height:46px;margin-top:13px;}
  .bars .bcol{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:4px;height:100%;}
  .bars .bar{width:100%;max-width:26px;border-radius:5px 5px 2px 2px;background:var(--accent-soft);min-height:5px;}
  .bars .bar.hold{background:var(--tag-green-bg);}
  .bars .bar.top{background:var(--accent);}
  .bars .bar.top.hold{background:#5E9170;}
  .bars .bv{font-size:9.5px;color:var(--faint);font-weight:600;}
  .bars .bar.sup{background:#E7DEF7;}
  .bars .bar.top.sup{background:#7E6BD0;}
  .bars .bv.supv{color:#7E6BD0;}
  .bars .bv .cm{margin-left:1px;font-size:8px;}
  .suplegend{font-size:11.5px;color:#5F4DA8;background:#F3EFFB;border-radius:8px;padding:6px 10px;margin-top:10px;line-height:1.4;}
  .suplegend b{font-weight:700;}
  .pcard .footmeta{font-size:12px;color:var(--muted);margin-top:10px;}

  /* ---------- PLANS TAB ---------- */
  .plancard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:15px;margin-bottom:9px;}
  .plancard .pt{display:flex;align-items:center;gap:10px;}
  .plancard .pn{font-weight:700;font-size:16px;flex:1;letter-spacing:-.01em;}
  .plancard .pm{font-size:12.5px;color:var(--muted);margin-top:2px;}
  .plancard .steps{margin:11px 0 13px;display:flex;flex-direction:column;gap:5px;}
  .plancard .st{display:flex;align-items:center;gap:8px;font-size:13.5px;color:var(--ink-soft);}
  .plancard .st .o{width:18px;color:var(--faint);font-weight:700;font-size:12px;font-variant-numeric:tabular-nums;}
  .plancard .st .sn{flex:1;font-weight:500;}
  .plancard .st .sd{color:var(--muted);font-size:12.5px;}
  .planactions{display:flex;gap:8px;}
  .planactions .btn{flex:1;}
  .iconbtn{flex:none;width:48px;border:1px solid var(--line-strong);border-radius:11px;background:var(--card);display:grid;place-items:center;}
  .iconbtn:active{background:var(--hover);}

  /* ---------- overlays / sheets ---------- */
  .overlay{position:fixed;inset:0;z-index:30;background:rgba(33,28,22,.32);display:flex;align-items:flex-end;animation:fade .18s;}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .sheet{background:var(--bg);width:100%;max-width:560px;margin:0 auto;border-radius:20px 20px 0 0;max-height:90vh;overflow:auto;padding:8px 16px calc(26px + var(--safe-b));animation:rise .26s cubic-bezier(.2,.8,.2,1);position:relative;}
  @keyframes rise{from{transform:translateY(40px)}to{transform:translateY(0)}}
  .grab{width:38px;height:4px;border-radius:99px;background:var(--line-strong);margin:8px auto 16px;}
  .sheet h3{font-size:21px;font-weight:700;letter-spacing:-.02em;margin:0 0 2px;}
  .sheet .ds{color:var(--muted);font-size:13.5px;margin:0 0 18px;}
  .closebtn{position:absolute;right:18px;top:16px;width:32px;height:32px;border-radius:9px;background:var(--bg2);border:1px solid var(--line);font-size:16px;color:var(--muted);}
  .det-ex{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:8px;}
  .det-ex .dn{font-weight:700;font-size:14.5px;display:flex;align-items:center;gap:8px;}
  .det-ex .dsets{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;}
  .del{width:100%;margin-top:8px;background:transparent;border:1px solid var(--line-strong);color:var(--muted);font-weight:600;font-size:14px;padding:13px;border-radius:11px;}
  .del:active{background:var(--hover);}

  /* plan editor */
  .pe-name{width:100%;font-size:20px;font-weight:700;color:var(--ink);background:transparent;border:none;border-bottom:1px solid var(--line);padding:4px 2px 10px;letter-spacing:-.02em;}
  .pe-name:focus{outline:none;border-color:var(--accent);}
  .pe-step{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 12px;margin-bottom:7px;}
  .pe-step .o{width:16px;color:var(--faint);font-weight:700;font-size:12px;}
  .pe-step .mid{flex:1;min-width:0;}
  .pe-step .nm{font-weight:600;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .pe-step .md{font-size:12.5px;color:var(--muted);margin-top:1px;}
  .pe-step .ord{display:flex;flex-direction:column;gap:2px;}
  .pe-step .ord button{width:24px;height:18px;display:grid;place-items:center;color:var(--faint);font-size:10px;}
  .pe-step .ord button:active{color:var(--ink);}
  .pe-step .stech{width:30px;height:30px;flex:none;display:grid;place-items:center;color:var(--muted);border:1px solid var(--line);border-radius:8px;}
  .pe-step .stech:active{background:var(--hover);color:var(--ink);}
  .pe-step .stech svg{width:16px;height:16px;}
  .pe-add{margin-top:6px;}
  .sname{width:100%;font-size:15.5px;font-weight:600;color:var(--ink);background:var(--bg2);border:1px solid var(--line-strong);border-radius:10px;padding:13px;}
  .sname:focus{outline:none;border-color:var(--accent);background:#fff;}
  .triple{display:flex;gap:8px;margin-top:9px;}
  .mini{flex:1;background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px 6px;text-align:center;}
  .mini .ml{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600;}
  .mini .mrow{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:4px;}
  .mini .mb{width:26px;height:26px;border-radius:7px;background:var(--bg2);border:1px solid var(--line-strong);font-size:16px;font-weight:600;display:grid;place-items:center;line-height:1;}
  .mini .mv{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:16px;min-width:30px;}

  /* ---------- bottom nav ---------- */
  .nav{position:fixed;left:0;right:0;bottom:0;z-index:10;background:rgba(255,255,255,.92);backdrop-filter:saturate(1.6) blur(12px);-webkit-backdrop-filter:saturate(1.6) blur(12px);border-top:1px solid var(--line);padding-bottom:var(--safe-b);}
  .nav .row{max-width:560px;margin:0 auto;display:flex;height:var(--nav-h);}
  .nav button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--muted);font-size:11px;font-weight:600;letter-spacing:.01em;}
  .nav button svg{width:22px;height:22px;}
  .nav button.on{color:var(--ink);}
  .nav button.on svg{stroke:var(--accent);}

  .fade-in{animation:fadeUp .3s ease both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .xls{padding:13px 14px;margin:12px 0 16px;}
  .xrow{display:flex;gap:8px;}
  .toast{position:fixed;left:50%;bottom:calc(var(--nav-h) + var(--safe-b) + 16px);transform:translateX(-50%);z-index:50;background:var(--ink);color:#fff;font-weight:600;font-size:14px;padding:11px 16px;border-radius:11px;box-shadow:0 8px 24px rgba(0,0,0,.2);max-width:88%;text-align:center;animation:fadeUp .25s ease both;}
  .info{flex:none;width:28px;height:28px;border-radius:7px;color:var(--muted);display:grid;place-items:center;border:1px solid var(--line);background:var(--card);}
  .info:active{background:var(--hover);color:var(--ink);}
  .pcard{cursor:pointer;}
  .gcue{font-size:13px;color:var(--accent-d);background:var(--accent-soft);border-radius:8px;padding:8px 11px;margin:0 0 13px;font-weight:600;line-height:1.4;}
  .techimg{width:100%;border-radius:12px;border:1px solid var(--line);margin-bottom:14px;display:block;}
  .tsec{margin-top:15px;}
  .tsec .lab{font-size:11.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;}
  .tsec>div:not(.lab):not(.tstep):not(.tcue):not(.tmiss){font-size:14.5px;color:var(--ink-soft);}
  .tcue{background:var(--accent-soft);border-radius:9px;padding:9px 12px;margin-bottom:6px;font-weight:600;font-size:14px;color:var(--ink);display:flex;gap:9px;line-height:1.4;}
  .tcue .d{color:var(--accent);font-weight:700;}
  .tstep{display:flex;gap:10px;margin-bottom:8px;font-size:14.5px;color:var(--ink-soft);line-height:1.45;}
  .tstep .n{flex:none;width:21px;height:21px;border-radius:6px;background:var(--ink);color:#fff;font-size:11px;font-weight:700;display:grid;place-items:center;margin-top:1px;}

  .phaserow .phl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-top:2px;display:block;}
  .phead{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
  .gear{flex:none;width:38px;height:38px;border-radius:11px;background:var(--card);border:1px solid var(--line);color:var(--muted);display:grid;place-items:center;margin-top:4px;}
  .gear:active{background:var(--hover);color:var(--ink);}
  .gear svg{width:20px;height:20px;}

  .setrow{display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:13px 15px;margin-bottom:8px;}
  .setrow:active{background:var(--hover);}

  .setrow .st{font-weight:600;font-size:15px;color:var(--ink);}
  .setrow .ss{font-size:12.5px;color:var(--muted);}
  .switch{flex:none;width:46px;height:28px;border-radius:99px;background:var(--line-strong);position:relative;transition:background .15s;}

  .switch.on .knob{left:21px;}
  .setbtn{margin-bottom:9px;}

  .appfoot{text-align:center;color:var(--muted);font-size:12.5px;line-height:1.65;margin:16px 0 6px;}
  .gload{display:inline-block;font-size:12.5px;font-weight:600;color:var(--accent-d);background:var(--accent-soft);border-radius:7px;padding:4px 9px;margin:-2px 0 11px;}

  .pe-step.chained{margin-top:-2px;}
  .excard.chained{margin-top:-2px;}
  .superband{font-size:11px;font-weight:700;letter-spacing:.02em;color:var(--accent-d);background:var(--accent-soft);padding:6px 14px;border-bottom:1px solid var(--line);}
  .supercheck{display:flex;align-items:center;gap:9px;margin-top:10px;font-size:13px;color:var(--ink-soft);line-height:1.35;}
  .supercheck input{width:20px;height:20px;flex:none;accent-color:var(--accent);}
  .settag.super{background:var(--accent-soft);color:var(--accent-d);}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ===========================================================
   Satz – Calisthenics Log  (single-file PWA)
   Daten lokal (localStorage) mit In-Memory-Fallback.
   =========================================================== */
const store={ _m:{},
  get(k){ try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return (k in this._m)?this._m[k]:null;} },
  set(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch(e){this._m[k]=v;} } };
const K={active:"satz.active",sessions:"satz.sessions",lib:"satz.lib",plans:"satz.plans",tech:"satz.tech",settings:"satz.settings"};

let state={
  active:  store.get(K.active)  || null,
  sessions:store.get(K.sessions)|| [],
  lib:     store.get(K.lib)     || {},
  plans:   store.get(K.plans)   || [],
  tech:    store.get(K.tech)    || {},
  settings:store.get(K.settings)|| {},
};
let ui={ tab:"train",
         showComposer:false, compMode:"reps",
         planEdit:null, stepMode:"reps",
         techName:null, techEdit:false };

const SEED_TECH={
 "kettlebell swing":{setup:"Füße schulterbreit, Kettlebell ~30 cm vor dir. Hüfte nach hinten (Hinge, kein Squat), Rücken gerade.",steps:["Bell zwischen die Beine nach hinten andocken, Hamstrings laden.","Hüfte explosiv nach vorn schnappen, Po fest – aufrecht stehen.","Bell schwebt auf Brusthöhe (Hüftkraft, nicht Arme), zurückfallen lassen."],cues:["Kraft aus der Hüfte, nicht aus den Armen","Neutraler Rücken, kein Rundrücken","Oben Po fest, nicht ins Hohlkreuz"],breath:"Oben ausatmen, beim Zurückschwingen einatmen.",mistakes:["In die Hocke gehen statt hingen","Bell mit den Armen hochheben","Am Top zurücklehnen"],link:""},
 "liegestütze":{setup:"Hände etwas weiter als schulterbreit, Körper bildet eine gerade Linie von Kopf bis Ferse.",steps:["Körper kontrolliert senken, bis die Brust knapp über dem Boden ist.","Ellbogen ~45° zum Körper.","Kraftvoll hochdrücken, Rumpf bleibt fest."],cues:["Körper bleibt bretthart gerade","Ellbogen ~45°, nicht abgespreizt","Voller Bewegungsumfang"],breath:"Beim Senken ein, beim Drücken aus.",mistakes:["Hüfte hängt durch oder schiebt hoch","Nur halb runter","Kopf in den Nacken"],link:""},
 "klimmzüge":{setup:"Griff schulterbreit, Handflächen vom Körper weg. An der Stange hängen, Schultern aktiv.",steps:["Schulterblätter zuerst nach unten/hinten ziehen.","Hochziehen, bis das Kinn über der Stange ist.","Kontrolliert ablassen, ganz ausstrecken."],cues:["Aus den Schulterblättern initiieren","Brust zur Stange, Ellbogen nach unten","Kein Schwung (kein Kipping)"],breath:"Oben ausatmen, beim Ablassen einatmen.",mistakes:["Mit Schwung mogeln","Nicht ganz ausstrecken","Schultern hochgezogen"],link:""},
 "dips":{setup:"An Barren stützen, Arme gestreckt, Schultern unten, leicht nach vorn gelehnt.",steps:["Kontrolliert absenken, bis Ellbogen ~90°.","Ellbogen eng am Körper.","Hochdrücken, oben nicht einrasten."],cues:["Schultern weg von den Ohren","Ellbogen eng, nicht ausladend","Nur so tief, wie die Schulter es zulässt"],breath:"Beim Senken ein, beim Drücken aus.",mistakes:["Zu tief (Schulterstress)","Ellbogen flattern nach außen","Mit Schwung"],link:""},
 "kniebeuge":{setup:"Füße schulterbreit, Zehen leicht nach außen, Rumpf fest, Blick nach vorn.",steps:["Hüfte nach hinten und runter, Knie folgen den Zehen.","Tief, bis Oberschenkel ~parallel.","Durch die Fersen hochdrücken."],cues:["Knie Richtung Zehen, nicht nach innen","Fersen bleiben am Boden","Brust auf, neutraler Rücken"],breath:"Runter ein, hoch aus.",mistakes:["Knie kippen nach innen","Fersen heben ab","Rundrücken"],link:""},
 "ausfallschritte":{setup:"Aufrecht stehen, Rumpf fest. Großer Schritt nach vorn.",steps:["Hinteres Knie Richtung Boden senken, beide Knie ~90°.","Vorderes Knie über dem Fußgelenk.","Über die vordere Ferse zurückdrücken."],cues:["Oberkörper aufrecht","Vorderes Knie stabil über dem Fuß","Kontrolliert, nicht fallen lassen"],breath:"Runter ein, hoch aus.",mistakes:["Vorderes Knie kippt nach innen","Zu kurzer Schritt","Oberkörper kippt vor"],link:""},
 "plank":{setup:"Unterarme unter den Schultern, Körper eine gerade Linie, Zehen aufgestellt.",steps:["Bauch und Po aktiv anspannen.","Halten, ruhig weiteratmen."],cues:["Gerade Linie Kopf–Ferse","Po anspannen, kein Durchhängen","Schultern weg von den Ohren"],breath:"Ruhig weiteratmen, nicht pressen.",mistakes:["Hüfte sackt ab","Po zu hoch","Kopf hängt"],link:""},
 "hollow hold":{setup:"Auf dem Rücken, unterer Rücken fest in den Boden gedrückt.",steps:["Schultern und Beine vom Boden heben.","Körper bildet eine flache Schale, Arme nach hinten."],cues:["Unterer Rücken bleibt am Boden","Rumpf fest, Schale halten","Schultern leicht angehoben"],breath:"Flach, kontrolliert weiteratmen.",mistakes:["Unterer Rücken hebt ab","Beine zu hoch (zu leicht)","Luft anhalten"],link:""},
 "l-sit":{setup:"Auf Boden oder Parallettes stützen, Schultern unten, Arme gestreckt.",steps:["Vom Boden abdrücken, Beine gestreckt nach vorn heben.","Beine möglichst waagerecht halten."],cues:["Schultern aktiv nach unten drücken","Beine gestreckt, Zehen lang","Rumpf fest"],breath:"Ruhig weiteratmen.",mistakes:["Schultern hochgezogen","Rundrücken","Luft anhalten"],link:""},
 "wall sit":{setup:"Rücken an der Wand, runterrutschen bis Oberschenkel waagerecht, Knie ~90°.",steps:["Position halten, Gewicht auf den Fersen.","Rücken flach an der Wand."],cues:["Knie über den Knöcheln, ~90°","Rücken komplett an der Wand","Gewicht auf den Fersen"],breath:"Ruhig weiteratmen.",mistakes:["Knie über die Zehen","Po zu hoch","Auf den Zehen"],link:""},
 "glute bridge":{setup:"Auf dem Rücken, Füße hüftbreit nah am Po, Arme neben dem Körper.",steps:["Po anspannen, Hüfte nach oben drücken bis gerade Linie Knie–Hüfte–Schulter.","Kurz halten, kontrolliert ablassen."],cues:["Bewegung aus dem Po, nicht dem unteren Rücken","Oben Po fest zusammendrücken","Rippen unten, kein Hohlkreuz"],breath:"Oben ausatmen.",mistakes:["Ins Hohlkreuz drücken","Mit den Beinen statt Po","Nicht ganz hoch"],link:""},
 "mountain climbers":{setup:"Liegestützposition, Hände unter den Schultern, Körper gerade.",steps:["Abwechselnd ein Knie zur Brust ziehen.","Tempo gleichmäßig, Hüfte ruhig."],cues:["Hüfte bleibt tief und ruhig","Rumpf fest, kein Hochschaukeln","Schultern über den Händen"],breath:"Gleichmäßig im Rhythmus atmen.",mistakes:["Po wandert hoch","Hände wandern nach vorn","Zu hektisch, Form verloren"],link:""}
};

const SEED_MODE={"plank":"hold","hollow hold":"hold","l-sit":"hold","wall sit":"hold"};

const save=()=>{store.set(K.active,state.active);store.set(K.sessions,state.sessions);store.set(K.lib,state.lib);store.set(K.plans,state.plans);store.set(K.tech,state.tech);store.set(K.settings,state.settings);};
const uid=()=>Math.random().toString(36).slice(2,9);
const MONTHS=["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
const APP_VERSION="v11", APP_BUILD="07.07.2026";

function fmtClock(sec){sec=Math.max(0,Math.floor(sec));const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;const mm=String(m).padStart(2,"0"),ss=String(s).padStart(2,"0");return h>0?`${h}:${mm}:${ss}`:`${m}:${ss}`;}
function durLabel(sec){const m=Math.round(sec/60);if(m<1)return "<1 min";if(m<60)return m+" min";const h=Math.floor(m/60),r=m%60;return r?h+" h "+r+" min":h+" h";}
function vib(p){try{navigator.vibrate&&navigator.vibrate(p);}catch(e){}}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function rememberLib(name,mode,v,w){const k=name.toLowerCase();const cur=state.lib[k]||{};state.lib[k]={...cur,name,mode,last:v,best:Math.max(v,cur.best||0)};if(w!==undefined)state.lib[k].lastW=w;}

/* Übungstypen: reps (Wdh) · hold (Halten) · time (Zeit/Aufwärmen) */
const isTimed   = m => m==="hold"||m==="time";
const modeLabel = m => m==="hold"?"Halten":(m==="time"?"Zeit":"Wdh");
const modeTag   = m => m==="hold"?"hold":(m==="time"?"time":"reps");
const fmtVal    = (m,v) => isTimed(m)?fmtClock(v):String(v);
const EQUIP=["","Kettlebell","Kurzhantel","Langhantel","Band","Gewichtsweste","Sonstiges"];
function loadLabel(ex,s){ if(!s||!s.w) return ""; const eq=ex.equip?esc(ex.equip)+" ":""; return ` · ${eq}${s.w} kg`; }

const app=document.getElementById("app");

/* ===========================================================
   ROOT RENDER
   =========================================================== */
function render(){
  if(state.active){ renderActive(); return; }
  if(ui.tab==="train") renderTrain();
  else if(ui.tab==="plans") renderPlans();
  else if(ui.tab==="lib") renderLib();
  else renderProgress();
  app.insertAdjacentHTML("beforeend", navHTML());
  bindNav();
  const g=document.getElementById("gear"); if(g) g.onclick=openSettings;
}
function navHTML(){
  const item=(id,label,svg)=>`<button data-tab="${id}" class="${ui.tab===id?"on":""}">${svg}<span>${label}</span></button>`;
  return `<div class="nav"><div class="row">
     ${item("train","Training",icoTrain())}
     ${item("plans","Pläne",icoPlans())}
     ${item("lib","Übungen",icoLib())}
     ${item("progress","Fortschritt",icoProg())}
   </div></div>`;
}
function bindNav(){ app.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>{ui.tab=b.dataset.tab;render();}); }
function pageHeader(eyebrow,title){return `<header class="page"><div class="phead"><div><div class="eyebrow">${eyebrow}</div><h1 class="h">${title}</h1></div><button class="gear" id="gear" title="Einstellungen">${icoGear()}</button></div></header>`;}
function icoGear(){return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`;}

/* ===========================================================
   TRAIN TAB
   =========================================================== */
function renderTrain(){
  const sessions=[...state.sessions].sort((a,b)=>b.start-a.start);
  app.innerHTML=`
   ${pageHeader(greeting(),"Training")}
   <div class="scroll fade-in">
     <div class="hero"><button class="btn primary" id="start">${icoBolt()} Freies Training starten</button></div>
     ${ state.plans.length ? `
       <div class="seclabel"><span class="eyebrow">Plan starten</span></div>
       <div class="quickplans">${ state.plans.map(p=>`
         <button class="qp" data-startplan="${p.id}">
           <span class="ic">${icoPlay()}</span>
           <span class="nm">${esc(p.name)}<div class="me">${p.steps.length} Übungen · ≈ ${planEst(p)} min</div></span>
           <span class="go">Start →</span>
         </button>`).join("") }</div>` : "" }
     <div class="seclabel"><span class="eyebrow">Verlauf</span><span class="cnt">${sessions.length?sessions.length+" Einheiten":""}</span></div>
     ${ sessions.length ? sessions.map(sessRow).join("")
        : `<div class="empty"><span class="em">Noch nichts geloggt</span>Starte deine erste Einheit – die Zeit läuft automatisch mit.</div>` }
   </div>`;
  document.getElementById("start").onclick=()=>startFree();
  app.querySelectorAll("[data-startplan]").forEach(b=>b.onclick=()=>{const p=state.plans.find(x=>x.id===b.dataset.startplan);if(p)startPlan(p);});
  app.querySelectorAll("[data-sess]").forEach(el=>el.onclick=()=>openDetail(el.dataset.sess));
}
function sessRow(s){
  const d=new Date(s.start);const names=s.exercises.map(e=>e.name);const sets=s.exercises.reduce((n,e)=>n+e.sets.length,0);
  return `<button class="sess" data-sess="${s.id}">
    <div class="day"><div class="d num">${d.getDate()}</div><div class="m">${MONTHS[d.getMonth()]}</div></div>
    <div class="div"></div>
    <div class="mid"><div class="ex">${names.length?esc(names.join(" · ")):"Einheit"}</div>
      <div class="meta">${s.planName?esc(s.planName)+" · ":""}${s.exercises.length} Übungen · ${sets} Sätze</div></div>
    <div class="dur num">${durLabel((s.end-s.start)/1000)}</div></button>`;
}

/* ===========================================================
   ACTIVE / FOCUS
   =========================================================== */
function renderActive(){
  const a=state.active, g=a.guide;
  app.innerHTML=`
   <header class="page">
     <div class="phead">
       <div><div class="eyebrow"><span class="dotpulse"></span>Aktives Training</div>
         <h1 class="h">${g?esc(g.planName):"Freies Training"}</h1></div>
       <button class="endbtn2" id="end">Beenden</button>
     </div>
   </header>
   <div class="focus">
     ${ g ? guideCard() : "" }
     <div id="exlist">${ a.exercises.map(ex=>exCard(ex,!!g)).join("") }</div>
     ${ g ? (g.idx>=g.queue.length ? "" : `<button class="glink" id="leave" style="display:block;margin:6px auto 0;">Plan verlassen, frei weitertrainieren</button>`)
          : (ui.showComposer?composerHTML():`<button class="addtoggle" id="addtog">${icoPlusAccent()} Übung hinzufügen</button>`) }
   </div>`;
  document.getElementById("end").onclick=endSession;
  const e2=document.getElementById("end2"); if(e2) e2.onclick=endSession;
  const lv=document.getElementById("leave"); if(lv) lv.onclick=()=>{state.active.guide=null;save();render();};
  const tog=document.getElementById("addtog"); if(tog) tog.onclick=()=>{ui.showComposer=true;render();focusComposer();};
  bindActive(); if(ui.showComposer) focusComposer();
}
function focusComposer(){const i=document.getElementById("exname");if(i)i.focus();}

/* ---- guide ---- */
function guideCard(){
  const g=state.active.guide;
  if(g.idx>=g.queue.length){
    return `<div class="guide done">
      <div class="glabel">Plan abgeschlossen</div>
      <div class="gtitle" style="justify-content:center">${esc(g.planName)} ✓</div>
      <p class="gsub">${g.queue.length} Sätze geschafft. Stark.</p>
      <button class="btn primary" id="end2">Training beenden</button></div>`;
  }
  const it=g.queue[g.idx], nx=g.queue[g.idx+1];
  const timed=isTimed(it.mode);
  const unit=timed?"Sekunden":"Wdh";
  const shown=timed?fmtClock(it.target):it.target;
  const inner = `<div class="stepper"><button class="step" data-gstep="-1">–</button>
      <div class="stepval"><div class="v num" id="guideval" data-val="${it.target}">${shown}</div><div class="u">${unit} · Ziel ${timed?fmtClock(it.target):it.target}</div></div>
      <button class="step" data-gstep="1">+</button></div>
      <button class="btn primary logbtn" id="glog">Satz erledigt</button>`;
  const restHint = (it.rest>0 && nx) ? ` · danach ${it.rest}s Pause` : "";
  return `<div class="guide">
    <div class="ghead"><span class="glabel">${esc(g.planName)}</span><span class="gprog num">Satz ${g.idx+1}/${g.queue.length}</span></div>
    <div class="gtitle">${esc(it.name)} <span class="settag">Satz ${it.setNo}/${it.setTotal}</span>${it.superInfo?`<span class="settag super">⛓ Supersatz</span>`:""}
      <button class="info" data-info="${esc(it.name)}" style="margin-left:auto">${icoInfo()}</button></div>
    ${guideCue(it.name)}

function weightRow(ex,w){

  return `<div class="loadrow">

   </div>`;
}
function exCard(ex,guided){
  const lib=state.lib[ex.name.toLowerCase()]||{};
  const libBest=lib.best||0;
  const timed=isTimed(ex.mode);
  const lastV=ex.sets.length?ex.sets[ex.sets.length-1].v:(lib.last ?? (ex.mode==="time"?60:(ex.mode==="hold"?30:10)));
  const lastW=ex.sets.length?(ex.sets[ex.sets.length-1].w||0):(lib.lastW||0);
  let adder="";
  if(!guided){
    adder = `<div class="stepper"><button class="step" data-step="${ex.id}|-1">–</button>
      <div class="stepval"><div class="v num" id="rep-${ex.id}" data-val="${lastV}">${timed?fmtClock(lastV):lastV}</div><div class="u">${timed?"Sekunden":"Wdh"}</div></div>
      <button class="step" data-step="${ex.id}|1">+</button></div>
      ${ex.mode==="time"?"":weightRow(ex,lastW)}
      <button class="btn primary logbtn" data-logset="${ex.id}">Satz speichern</button>`;
  }
  const equipTag = ex.equip?`<span class="equiptag">${esc(ex.equip)}</span>`:"";
  return `<div class="excard${ex.superset?" chained":""}">
    ${ex.superset?`<div class="superband">⛓ Supersatz – direkt nach voriger Übung</div>`:""}
    <div class="ex-head"><span class="name">${esc(ex.name)}</span>${equipTag}<span class="tag ${modeTag(ex.mode)}">${modeLabel(ex.mode)}</span>
      <button class="info" data-info="${esc(ex.name)}">${icoInfo()}</button>
      ${guided?"":`<button class="x" data-delex="${ex.id}">✕</button>`}</div>
    ${ ex.sets.length?`<div class="sets">${ex.sets.map((s,i)=>setChip(ex,s,i,libBest)).join("")}</div>`:"" }
    ${ adder?`<div class="addset">${adder}</div>`:"" }
  </div>`;
}
function setChip(ex,s,i,best){
  const pr = best>0 && s.v>=best && s.v===Math.max(...ex.sets.map(x=>x.v));
  const txt = fmtVal(ex.mode,s.v);
  const unit = isTimed(ex.mode)?"":'<span class="i">Wdh</span>';
  const wt = s.w?`<span class="iw">${s.w} kg</span>`:"";
  return `<button class="setchip ${pr?"pr":""}" data-rmset="${ex.id}|${i}"><span class="i">${i+1}</span>${txt}${unit}${wt}<span class="rm">✕</span></button>`;
}

function findOrCreateEx(name,mode,equip){let ex=state.active.exercises.find(e=>e.name.toLowerCase()===name.toLowerCase()&&e.mode===mode);if(!ex){ex={id:uid(),name,mode,sets:[],equip:equip||""};state.active.exercises.push(ex);}else if(equip&&!ex.equip){ex.equip=equip;}return ex;}
function guideLog(v){const g=state.active.guide,it=g.queue[g.idx];const ex=findOrCreateEx(it.name,it.mode,it.equip);const w=it.weight||0;const set=w?{v,w}:{v};if(it.sup)set.sup=true;ex.sets.push(set);rememberLib(it.name,it.mode,v,w);g.idx++;vib(18);save();render();}

function aggregate(){
  const map={};
  state.sessions.forEach(s=>{ const t=s.start;
    s.exercises.forEach(ex=>{ const key=ex.name.toLowerCase()+"|"+ex.mode;
      if(!map[key])map[key]={name:ex.name,mode:ex.mode,sets:[],best:0,sessions:new Set(),last:0};
      ex.sets.forEach(st=>{ map[key].sets.push({v:st.v,t,sup:!!st.sup}); map[key].best=Math.max(map[key].best,st.v); });
      map[key].sessions.add(s.id); map[key].last=Math.max(map[key].last,t);
    });
  });
  return Object.values(map).map(o=>({...o,sessions:o.sessions.size})).sort((a,b)=>b.last-a.last);
}
function weekSummary(){
  const since=Date.now()-7*24*60*60*1000;
  const recent=state.sessions.filter(s=>s.start>=since);
  const sets=recent.reduce((n,s)=>n+s.exercises.reduce((m,ex)=>m+ex.sets.length,0),0);
  return {sessions:recent.length,sets};
}
function weekCard(){
  const w=weekSummary();
  return `<div class="weekcard">
    <div class="wstat"><span class="wval num">${w.sessions}</span><span class="wlbl">Einheit${w.sessions===1?"":"en"} · 7 Tage</span></div>
    <div class="wstat"><span class="wval num">${w.sets}</span><span class="wlbl">Sätze · 7 Tage</span></div>
  </div>`;
}
function renderProgress(){
  const data=aggregate();
  app.innerHTML=`
   ${pageHeader("Pro Übung","Fortschritt")}
   <div class="scroll fade-in">
     ${weekCard()}
     ${ data.length ? data.map(progressCard).join("")
        : `<div class="empty"><span class="em">Noch keine Daten</span>Sobald du Sätze loggst, siehst du hier deine Bestwerte und die letzten Sätze.</div>` }
   </div>`;
  app.querySelectorAll("[data-info]").forEach(b=>b.onclick=()=>openTech(b.dataset.info));
}
function progressCard(o){
  const timed=isTimed(o.mode);
  const recent=o.sets.slice(-8);
  const max=Math.max(...recent.map(s=>s.v),1);
  const bestEver=o.best;
  const barcls=o.mode==="reps"?"":"hold";
  const bars=recent.map(s=>{const h=Math.max(8,Math.round(s.v/max*100));const top=s.v>=bestEver;
    return `<div class="bcol"><div class="bar ${barcls} ${top?"top":""} ${s.sup?"sup":""}" style="height:${h}%"></div><div class="bv ${s.sup?"supv":""}">${fmtVal(o.mode,s.v)}${s.sup?`<span class="cm">⛓</span>`:""}</div></div>`;}).join("");
  const supSets=o.sets.filter(s=>s.sup);
  const supBest=supSets.length?Math.max(...supSets.map(s=>s.v)):0;
  const d=new Date(o.last);
  return `<div class="pcard" data-info="${esc(o.name)}">
    <div class="top"><span class="tag ${modeTag(o.mode)}">${modeLabel(o.mode)}</span><span class="nm">${esc(o.name)}</span>
      <span class="best num">${fmtVal(o.mode,bestEver)}<span class="bl">Best</span></span></div>
    <div class="bars">${bars}</div>
    ${ supSets.length ? `<div class="suplegend">⛓ Supersatz – ohne Pause direkt davor${supBest?` · Best im Supersatz <b>${fmtVal(o.mode,supBest)}</b>`:""}</div>` : "" }
    <div class="footmeta">${o.sessions} Einheit${o.sessions>1?"en":""} · ${o.sets.length} Sätze · zuletzt ${d.getDate()}. ${MONTHS[d.getMonth()]} · Technik ansehen</div>
  </div>`;
}

/* ---- Excel / CSV Im- & Export ---- */
const PLAN_HEADER=["Plan","Übung","Typ","Ziel","Sätze","Pause","Gerät","Gewicht","Supersatz","Setup","Ablauf","Cues","Atmung","Fehler","Video"];
const LIB_HEADER=["Übung","Typ","Setup","Ablauf","Cues","Atmung","Fehler","Video","Löschen"];
const titleCase=s=>String(s||"").replace(/(^|[\s\-\/])(\p{L})/gu,(m,a,b)=>a+b.toUpperCase());
const techSplit=s=>String(s||"").split(/[|\n]/).map(x=>x.trim()).filter(Boolean);
function techCols(name){const t=state.tech[(name||"").toLowerCase()]||{};return [t.setup||"",(t.steps||[]).join(" | "),(t.cues||[]).join(" | "),t.breath||"",(t.mistakes||[]).join(" | "),t.link||""];}
function techFromCols(c){return {setup:String(c[0]||"").trim(),steps:techSplit(c[1]),cues:techSplit(c[2]),breath:String(c[3]||"").trim(),mistakes:techSplit(c[4]),link:String(c[5]||"").trim()};}
function techHasContent(t){return !!(t.setup||t.link||t.breath||(t.steps&&t.steps.length)||(t.cues&&t.cues.length)||(t.mistakes&&t.mistakes.length));}
function plansToRows(plans){
  const rows=[PLAN_HEADER.slice()];
  plans.forEach(p=>{
    if(!p.steps.length){ rows.push([p.name,...Array(PLAN_HEADER.length-1).fill("")]); return; }
    p.steps.forEach(s=>{ rows.push([p.name,s.name,modeLabel(s.mode),s.target,s.sets,s.rest,s.equip||"",s.weight||"",s.superset?"Ja":"", ...techCols(s.name)]); });
  });
  return rows;
}
function libNames(){const m=new Map();Object.values(state.lib).forEach(o=>{if(o&&o.name)m.set(o.name.toLowerCase(),o.name);});Object.keys(state.tech).forEach(k=>{if(!m.has(k))m.set(k,titleCase(k));});return m;}
function libDatalist(){return [...libNames().values()].sort((a,b)=>a.localeCompare(b,"de")).map(n=>`<option value="${esc(n)}">`).join("");}
function libToRows(){
  const rows=[LIB_HEADER.slice()];
  [...libNames().entries()].sort((a,b)=>a[1].localeCompare(b[1],"de")).forEach(([k,name])=>{
    const mode=(state.lib[k]&&state.lib[k].mode)||"reps";
    rows.push([name,modeLabel(mode),...techCols(name),""]);
  });
  return rows;
}
function templatePlanRows(){
  return [PLAN_HEADER.slice(),
    ["Push Day","Liegestütze","Wdh",12,3,60,"","","","Hände etwas weiter als schulterbreit, Körper gerade.","Senken bis Brust knapp über Boden | Kraftvoll hochdrücken","Körper bretthart | Ellbogen ~45°","Beim Drücken ausatmen","Hüfte hängt durch | Nur halb runter",""],
    ["Pull Day","Klimmzüge","Wdh",8,4,0,"","","","Griff schulterbreit, an der Stange hängen.","Schulterblätter nach unten | Hochziehen bis Kinn über Stange","Aus den Schulterblättern | Kein Schwung","Oben ausatmen","Mit Schwung mogeln",""],
    ["Pull Day","Liegestütze","Wdh",12,4,90,"","","Ja","","","Supersatz – direkt nach Klimmzügen, dann Pause","","",""],
    ["Kettlebell","Kettlebell Swing","Wdh",15,3,60,"Kettlebell",16,"","Füße schulterbreit, Hüfte nach hinten (Hinge).","Bell andocken | Hüfte explosiv nach vorn","Kraft aus der Hüfte | Neutraler Rücken","Oben ausatmen","In die Hocke gehen | Mit Armen heben",""],
    ["Core kurz","Hollow Hold","Halten",30,3,30,"","","","Auf dem Rücken, unterer Rücken fest am Boden.","Schultern und Beine heben | Flache Schale halten","Unterer Rücken bleibt am Boden","Flach weiteratmen","Unterer Rücken hebt ab",""]];
}
function templateLibRows(){
  return [LIB_HEADER.slice(),
    ["Liegestütze","Wdh","Hände etwas weiter als schulterbreit, Körper gerade.","Senken bis Brust knapp über Boden | Kraftvoll hochdrücken","Körper bretthart | Ellbogen ~45°","Beim Drücken ausatmen","Hüfte hängt durch | Nur halb runter","",""],
    ["Klimmzüge","Wdh","Griff schulterbreit, an der Stange hängen.","Schulterblätter nach unten | Hochziehen bis Kinn über Stange","Aus den Schulterblättern | Kein Schwung","Oben ausatmen","Mit Schwung mogeln","",""],
    ["Kettlebell Swing","Wdh","Füße schulterbreit, Hüfte nach hinten (Hinge).","Bell andocken | Hüfte explosiv nach vorn","Kraft aus der Hüfte | Neutraler Rücken","Oben ausatmen","In die Hocke gehen","",""]];
}
function techFromPlanRows(rows){
  if(!rows||!rows.length)return {};
  let start=0; if(String((rows[0]&&rows[0][0])||"").toLowerCase().includes("plan")) start=1;
  const m={};
  for(let i=start;i<rows.length;i++){const r=rows[i];if(!r)continue;
    const name=String(r[1]??"").trim();if(!name)continue;
    const t=techFromCols([r[9],r[10],r[11],r[12],r[13],r[14]]);
    if(techHasContent(t)) m[name.toLowerCase()]=t;
  }
  return m;
}
function applyLibRows(rows){
  if(!rows||!rows.length)return {n:0,removed:0};
  let start=0; const h0=String((rows[0]&&rows[0][0])||"").toLowerCase();
  if(h0.includes("übung")||h0.includes("uebung")||h0.includes("exercise")) start=1;
  let n=0,removed=0;
  for(let i=start;i<rows.length;i++){const r=rows[i];if(!r)continue;
    const name=String(r[0]??"").trim();if(!name)continue;
    const key=name.toLowerCase();
    const del=/^(ja|j|x|1|yes|y|true|wahr|löschen|loeschen|delete)/.test(String(r[8]??"").trim().toLowerCase());
    if(del){ if(state.lib[key]||state.tech[key])removed++; delete state.lib[key]; delete state.tech[key]; continue; }
    const typ=String(r[1]??"").trim().toLowerCase();
    const mode=(typ.startsWith("zeit")||typ.startsWith("time")||typ.startsWith("dauer"))?"time":((typ.startsWith("halt")||typ.startsWith("hold"))?"hold":"reps");
    const t=techFromCols([r[2],r[3],r[4],r[5],r[6],r[7]]);
    if(techHasContent(t)) state.tech[key]={...(state.tech[key]||{}),...t};
    state.lib[key]={...(state.lib[key]||{}),name,mode};
    n++;
  }
  return {n,removed};
}
function parseDur(v,def){ if(v===0)return 0; if(v==null||v==="")return def;
  let s=String(v).trim().toLowerCase().replace(/sek|sec|s$/,"").trim();
  if(s.includes(":")){const[m,se]=s.split(":");return (parseInt(m,10)||0)*60+(parseInt(se,10)||0);}
  const n=parseInt(s,10);return isNaN(n)?def:n; }
function rowsToPlans(rows){
  if(!rows||!rows.length)return [];
  let start=0; const h0=String((rows[0]&&rows[0][0])||"").toLowerCase();
  if(h0.includes("plan")) start=1;
  const byName=new Map(), order=[];
  for(let i=start;i<rows.length;i++){
    const r=rows[i]; if(!r)continue;
    const plan=String(r[0]??"").trim(); if(!plan)continue;
    if(!byName.has(plan)){ byName.set(plan,{id:uid(),name:plan,steps:[]}); order.push(plan); }
    const ex=String(r[1]??"").trim(); if(!ex)continue;
    const typ=String(r[2]??"").trim().toLowerCase();
    const mode=(typ.startsWith("zeit")||typ.startsWith("time")||typ.startsWith("dauer"))?"time":((typ.startsWith("halt")||typ.startsWith("hold"))?"hold":"reps");
    const target=Math.max(1,parseDur(r[3],isTimed(mode)?(mode==="time"?60:30):10));
    let sets=parseInt(r[4],10); if(!sets||sets<1)sets=1;
    const rest=Math.max(0,parseDur(r[5],60));
    const timed=mode==="time";
    let weight=parseFloat(String(r[7]??"").replace(",",".")); if(isNaN(weight)||weight<0)weight=0;
    const equip=timed?"":String(r[6]??"").trim();
    if(timed)weight=0;
    const superRaw=String(r[8]??"").trim().toLowerCase();
    const hadSteps=byName.get(plan).steps.length>0;
    const superset=hadSteps && /^(ja|j|yes|y|x|1|true|wahr)/.test(superRaw);
    byName.get(plan).steps.push({id:uid(),name:ex,mode,target,sets,rest,equip,weight,superset});
  }
  return order.map(n=>byName.get(n));
}
function rowsToCSV(rows){ const e=v=>{v=String(v??"");return /[";\n,]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}; return "\uFEFF"+rows.map(r=>r.map(e).join(";")).join("\r\n"); }
function csvToRows(text){ text=text.replace(/^\uFEFF/,""); const first=text.split(/\r?\n/)[0]||"";
  const delim=(first.split(";").length>=first.split(",").length)?";":",";
  const rows=[];let row=[],cur="",q=false;
  for(let i=0;i<text.length;i++){const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=c; }
    else { if(c==='"')q=true; else if(c===delim){row.push(cur);cur="";} else if(c==="\n"){row.push(cur);rows.push(row);row=[];cur="";} else if(c==="\r"){} else cur+=c; } }
  if(cur.length||row.length){row.push(cur);rows.push(row);}
  return rows.filter(r=>r.some(x=>String(x).trim()!==""));
}
function downloadBlob(content,filename,type){ const b=new Blob([content],{type});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=filename;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(u),1000); }
function exportPlans(template){
  if(!template && state.plans.length===0){ toast("Noch keine Pläne – nimm die leere Vorlage."); return; }
  const planRows = template ? templatePlanRows() : plansToRows(state.plans);
  const libRows  = template ? templateLibRows()  : libToRows();
  const fname = template ? "Trainingsplan-Vorlage" : "Trainingsplaene";
  const what  = template ? "Vorlage" : (state.plans.length+(state.plans.length>1?" Pläne":" Plan"));
  try{
    if(window.XLSX){
      const wb=XLSX.utils.book_new();
      const ws1=XLSX.utils.aoa_to_sheet(planRows); ws1["!cols"]=[{wch:16},{wch:20},{wch:8},{wch:7},{wch:7},{wch:7},{wch:13},{wch:8},{wch:10},{wch:30},{wch:34},{wch:30},{wch:20},{wch:30},{wch:22}];
      XLSX.utils.book_append_sheet(wb,ws1,"Pläne");
      const ws2=XLSX.utils.aoa_to_sheet(libRows); ws2["!cols"]=[{wch:20},{wch:8},{wch:30},{wch:34},{wch:30},{wch:20},{wch:30},{wch:22},{wch:9}];
      XLSX.utils.book_append_sheet(wb,ws2,"Übungen");
      XLSX.writeFile(wb,fname+".xlsx");
      toast(what+" exportiert (.xlsx · 2 Reiter)"); }
    else { downloadBlob(rowsToCSV(planRows),fname+".csv","text/csv;charset=utf-8"); toast(what+" exportiert (.csv – nur Pläne-Reiter)"); }
  }catch(err){ toast("Download hier blockiert – App gehostet oder lokal öffnen."); }
}
function importPlansFromFile(file){
  const name=(file.name||"").toLowerCase(), reader=new FileReader();
  reader.onload=e=>{ try{
    let planRows, libRows=null;
    if(name.endsWith(".csv")){ planRows=csvToRows(String(e.target.result)); }
    else if(window.XLSX){ const wb=XLSX.read(new Uint8Array(e.target.result),{type:"array"});
      const find=re=>wb.SheetNames.find(n=>re.test(n.toLowerCase()));
      const planSheet=find(/pl[äa]ne|plan/)||wb.SheetNames[0];
      const libSheet=find(/übung|uebung|exercise|biblio/);
      planRows=XLSX.utils.sheet_to_json(wb.Sheets[planSheet],{header:1,raw:true,defval:""});
      if(libSheet) libRows=XLSX.utils.sheet_to_json(wb.Sheets[libSheet],{header:1,raw:true,defval:""});
    } else { toast("Für .xlsx einmal online sein – oder CSV importieren."); return; }
    const imported=rowsToPlans(planRows);
    const tm=techFromPlanRows(planRows); Object.keys(tm).forEach(k=>{ state.tech[k]={...(state.tech[k]||{}), ...tm[k]}; });
    let lib={n:0,removed:0}; if(libRows) lib=applyLibRows(libRows);
    imported.forEach(np=>{ state.plans=state.plans.filter(p=>p.name.toLowerCase()!==np.name.toLowerCase()); state.plans.push(np); });
    if(!imported.length && !lib.n && !lib.removed){ toast("Nichts gefunden – Spaltenüberschriften prüfen."); return; }
    save(); render();
    const parts=[];
    if(imported.length) parts.push(imported.length+(imported.length>1?" Pläne":" Plan"));
    if(lib.n) parts.push(lib.n+" Übungen");
    if(lib.removed) parts.push(lib.removed+" gelöscht");
    toast((parts.join(" · ")||"Import")+" übernommen.");
  }catch(err){ toast("Import fehlgeschlagen."); } };
  if(name.endsWith(".csv")) reader.readAsText(file,"utf-8"); else reader.readAsArrayBuffer(file);
}
function toast(msg){ const t=document.createElement("div");t.className="toast";t.textContent=msg;document.body.appendChild(t);

function stepAdjust(field,dir){const s=ui._step;
  if(field==="target"){ if(isTimed(ui.stepMode)){const step=ui.stepMode==="time"?15:5;s.target=Math.max(5,s.target+dir*step);} else {s.target=Math.max(1,s.target+dir);} }
  else if(field==="sets"){s.sets=Math.max(1,s.sets+dir);}
  else if(field==="rest"){s.rest=Math.max(0,s.rest+dir*15);}
}

     ${ (ui.tab==="lib" && !state.active) ? `<button class="del" id="t-delex">Übung aus Bibliothek löschen</button>` : "" }</div>`;
  mountOverlay(ov);
  const close=()=>{const ret=ui.techReturn; ui.techReturn=null; ui.techName=null;ui.techEdit=false;closeOverlay(); if(ret){ui.planEdit=ret;renderPlanEditor();} else render();};
  ov.querySelector("#close").onclick=close; ov.onclick=e=>{if(e.target===ov)close();};
  const ed=ov.querySelector("#t-edit"); if(ed) ed.onclick=()=>{ui.techEdit=true;renderTechSheet();};
  const dl=ov.querySelector("#t-delex"); if(dl) dl.onclick=()=>{
    if(typeof confirm==="function" && !confirm(`„${name}" aus der Bibliothek löschen? Vergangene Einheiten bleiben erhalten.`)) return;
    delete state.lib[key]; delete state.tech[key]; save();
    ui.techName=null; ui.techEdit=false; closeOverlay(); render(); toast("Übung gelöscht.");
  };
  const cancel=ov.querySelector("#t-cancel"); if(cancel) cancel.onclick=()=>{ui.techEdit=false;renderTechSheet();};
  const sv=ov.querySelector("#t-save");
  if(sv) sv.onclick=()=>{
    const lines=id=>ov.querySelector(id).value.split("\n").map(x=>x.trim()).filter(Boolean);
    state.tech[key]={ setup:ov.querySelector("#t-setup").value.trim(), steps:lines("#t-steps"),
      cues:lines("#t-cues"), breath:ov.querySelector("#t-breath").value.trim(),
      mistakes:lines("#t-miss"), link:ov.querySelector("#t-link").value.trim() };
    save(); ui.techEdit=false; renderTechSheet();
  };
}

function openDetail(id){
  const s=state.sessions.find(x=>x.id===id);if(!s)return;
  const d=new Date(s.start),sets=s.exercises.reduce((n,e)=>n+e.sets.length,0);
  const dur=(s.end-s.start)/1000;
  const ov=document.createElement("div");ov.className="overlay";ov.id="ovl";
  ov.innerHTML=`<div class="sheet"><div class="grab"></div><button class="closebtn" id="close">✕</button>
    <h3>${d.getDate()}. ${MONTHS[d.getMonth()]} ${d.getFullYear()}</h3>
    <p class="ds">${s.planName?esc(s.planName)+" · ":""}${durLabel(dur)} · ${s.exercises.length} Übungen · ${sets} Sätze · ${d.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"})} Uhr</p>
    ${ s.exercises.map(ex=>`<div class="det-ex"><div class="dn">${esc(ex.name)} ${ex.equip?`<span class="equiptag">${esc(ex.equip)}</span>`:""}<span class="tag ${modeTag(ex.mode)}">${modeLabel(ex.mode)}</span></div>
      <div class="dsets">${ex.sets.map((st,i)=>`<span class="setchip"><span class="i">${i+1}</span>${fmtVal(ex.mode,st.v)}${isTimed(ex.mode)?"":'<span class="i">Wdh</span>'}${st.w?`<span class="iw">${st.w} kg</span>`:""}</span>`).join("")||'<span class="ds">keine Sätze</span>'}</div></div>`).join("") }
    <button class="del" id="delsess">Einheit löschen</button></div>`;
  mountOverlay(ov);
  const close=()=>closeOverlay();
  ov.querySelector("#close").onclick=close; ov.onclick=e=>{if(e.target===ov)close();};
  ov.querySelector("#delsess").onclick=()=>{state.sessions=state.sessions.filter(x=>x.id!==s.id);save();closeOverlay();render();};
}
function mountOverlay(ov){closeOverlay();document.body.appendChild(ov);}
function closeOverlay(){const o=document.getElementById("ovl");if(o)o.remove();}

/* ===========================================================
   SESSION ACTIONS
   =========================================================== */
function startFree(){state.active={start:Date.now(),exercises:[],guide:null};ui.showComposer=true;save();render();focusComposer();}
function startPlan(p){
  // Gruppen bilden: ein Schritt mit superset===true hängt direkt an die vorige Gruppe an
  const groups=[];
  p.steps.forEach((st,i)=>{ if(st.superset && i>0 && groups.length) groups[groups.length-1].push(st); else groups.push([st]); });
  const queue=[];
  groups.forEach(group=>{
    const rounds=Math.max(...group.map(st=>st.sets||1));
    const last=group[group.length-1];
    const groupRest=(last.rest||0)>0 ? last.rest : Math.max(0,...group.map(s=>s.rest||0));
    for(let r=0;r<rounds;r++){
      const active=group.filter(st=>r<(st.sets||1));
      active.forEach((st,j)=>{
        const lastInRound = j===active.length-1;
        queue.push({name:st.name,mode:st.mode,target:st.target,
          rest: lastInRound ? groupRest : 0,
          setNo:r+1,setTotal:st.sets,equip:st.equip||"",weight:st.weight||0,
          sup: group.length>1 && j>0,
          superInfo: group.length>1 ? {pos:j+1,of:active.length} : null});
      });
    }
  });
  state.active={start:Date.now(),exercises:[],guide:{planName:p.name,queue,idx:0}};ui.showComposer=false;save();render();
}
function endSession(){const a=state.active;const exercises=a.exercises.filter(e=>e.sets.length>0);
  if(exercises.length>0)state.sessions.push({id:uid(),start:a.start,end:Date.now(),exercises,planName:a.guide?a.guide.planName:null});
  state.active=null;ui.showComposer=false;ui.tab="train";save();render();}
